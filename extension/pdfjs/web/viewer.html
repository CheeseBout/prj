<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF.js Viewer</title>
  <link rel="stylesheet" href="viewer.css">
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
  <header class="viewer-header">
    <div>
      <strong>PDF.js Viewer</strong>
      <div id="sourceUrl" class="source-url"></div>
    </div>
    <div class="controls">
      <label for="scaleSelect">Zoom</label>
      <select id="scaleSelect">
        <option value="1">100%</option>
        <option value="1.25">125%</option>
        <option value="1.35" selected>135%</option>
        <option value="1.5">150%</option>
        <option value="1.75">175%</option>
      </select>
      <button id="openLocalPdfBtn" type="button">Mo PDF tu may</button>
      <button id="reloadBtn" type="button">Render lai</button>
      <input id="localPdfInput" type="file" accept="application/pdf,.pdf" hidden>
    </div>
  </header>

  <main id="viewerRoot"></main>

  <template id="pageTemplate">
    <section class="pdf-page">
      <h2 class="page-title"></h2>
      <div class="pdf-stage">
        <canvas class="pdf-canvas"></canvas>
        <div class="pdf-text-layer textLayer"></div>
      </div>
    </section>
  </template>

  <script type="module" src="viewer.js"></script>
  <script src="../../content.js"></script>
</body>
</html>
