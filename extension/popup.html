<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: system-ui, sans-serif; padding: 15px; width: 250px; }
    h3 { margin-top: 0; font-size: 16px; color: #1565c0; margin-bottom: 15px; }

    .toggle-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; }
    input:checked + .slider { background-color: #4caf50; }
    input:checked + .slider:before { transform: translateX(18px); }
    .slider.round { border-radius: 22px; }
    .slider.round:before { border-radius: 50%; }

    .mode-selector { display: flex; flex-direction: column; gap: 10px; }
    .mode-option { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; }
    .mode-desc { font-size: 12px; color: #666; margin-top: 2px; }
    .save-btn { margin-top: 15px; width: 100%; padding: 8px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
    .save-btn:hover { background: #1557b0; }
  </style>
</head>
<body>
  <h3>⚙️ Cài đặt Extension</h3>

  <div class="toggle-container">
    <span style="font-weight: 500; color: #333; font-size: 14px;">Trạng thái hoạt động:</span>
    <label class="switch">
      <input type="checkbox" id="toggleExtension" checked>
      <span class="slider round"></span>
    </label>
  </div>

  <div class="toggle-container">
    <span style="font-weight: 500; color: #333; font-size: 14px;">Dịch PDF (PDF.js):</span>
    <label class="switch">
      <input type="checkbox" id="togglePdfTranslation">
      <span class="slider round"></span>
    </label>
  </div>

  <div class="mode-selector">
    <label class="mode-option">
      <input type="radio" name="trans_mode" value="mode_vocab" checked>
      <div>
        <strong>Học Từ Vựng (Tooltip)</strong>
        <div class="mode-desc">Bôi sáng từ khó và hiển thị giải thích khi click.</div>
      </div>
    </label>
    <label class="mode-option">
      <input type="radio" name="trans_mode" value="mode_inline">
      <div>
        <strong>Dịch Chèn Dòng (Inline)</strong>
        <div class="mode-desc">Dịch toàn bộ đoạn văn, click để xem bản gốc.</div>
      </div>
    </label>
  </div>
  <button id="saveBtn" class="save-btn">Lưu thiết lập</button>

  <script src="popup.js"></script>
</body>
</html>
